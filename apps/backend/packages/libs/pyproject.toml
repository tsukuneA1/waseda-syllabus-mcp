[project]
name = "waseda-libs"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
    "psycopg[binary]>=3.1",
    "sqlalchemy[asyncio]>=2.0",
    "python-dotenv>=1.0",
    "playwright>=1.40",
    "tenacity>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/waseda_libs", "src/db"]
