[project]
name = "waseda-api"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "waseda-libs",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "psycopg[binary]>=3.1",
    "sqlalchemy[asyncio]>=2.0",
    "python-dotenv>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/waseda_api"]

[tool.uv.sources]
waseda-libs = { workspace = true }
